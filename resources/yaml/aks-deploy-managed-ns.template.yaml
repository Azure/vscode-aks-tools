# This workflow will build and push an application to a Azure Kubernetes Service (AKS) cluster when you push your code
#
# This workflow assumes you have already created the target AKS cluster and have created an Azure Container Registry (ACR) and attached it to the AKS cluster.
# For instructions see:
#   - https://docs.microsoft.com/en-us/azure/aks/kubernetes-walkthrough-portal
#   - https://docs.microsoft.com/en-us/azure/container-registry/container-registry-get-started-portal
#   - https://learn.microsoft.com/en-us/azure/aks/cluster-container-registry-integration?tabs=azure-cli#configure-acr-integration-for-existing-aks-clusters
#   - https://github.com/Azure/aks-create-action
#
# 🔐 IMPORTANT: OIDC Authentication Required!
# This workflow uses OpenID Connect (OIDC) to authenticate with Azure without storing secrets.
# You MUST configure the following GitHub repository secrets for this workflow to work:
#    - AZURE_CLIENT_ID     (Client ID of the managed identity or service principal) 
#    - AZURE_TENANT_ID     (Your Azure AD tenant ID)
#    - AZURE_SUBSCRIPTION_ID (Your Azure subscription ID)
#
# To set up OIDC authentication:
# 1. Use the AKS VS Code Extension "Setup OIDC for GitHub" command, OR
# 2. Follow the manual setup guide: https://docs.github.com/en/actions/deployment/security-hardening-your-deployments/configuring-openid-connect-in-azure
#
name: { { WORKFLOWNAME } }

on:
    push:
        branches: [{ { BRANCHNAME } }]
    workflow_dispatch:

env:
    ACR_RESOURCE_GROUP: { { ACRRESOURCEGROUP } }
    AZURE_CONTAINER_REGISTRY: { { AZURECONTAINERREGISTRY } }
    CONTAINER_NAME: { { CONTAINERNAME } }
    CLUSTER_NAME: { { CLUSTERNAME } }
    CLUSTER_RESOURCE_GROUP: { { CLUSTERRESOURCEGROUP } }
    DEPLOYMENT_MANIFEST_PATH: { { DEPLOYMENTMANIFESTPATH } }
    DOCKER_FILE: { { DOCKERFILE } }
    BUILD_CONTEXT_PATH: { { BUILDCONTEXTPATH } }
    NAMESPACE: { { NAMESPACE } }

jobs:
    buildImage:
        permissions:
            contents: read
            id-token: write
        runs-on: ubuntu-latest
        steps:
            # Checks out the repository this file is in
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            # Logs in with your Azure credentials
            - name: Azure login
              uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            # Logs into ACR
            - name: Log into ACR
              run: |
                  az acr login -n ${{ env.AZURE_CONTAINER_REGISTRY }}

            # Builds and pushes an image up to your Azure Container Registry
            - name: Build and push image to ACR
              run: |
                  az acr build --image ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.CONTAINER_NAME }}:${{ github.sha }} --registry ${{ env.AZURE_CONTAINER_REGISTRY }} -g ${{ env.ACR_RESOURCE_GROUP }} -f ${{ env.DOCKER_FILE }} ${{ env.BUILD_CONTEXT_PATH }}
    deploy:
        permissions:
            actions: read
            contents: read
            id-token: write
        runs-on: ubuntu-latest
        needs: [buildImage]
        steps:
            # Checks out the repository this file is in
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            # Logs in with your Azure credentials
            - name: Azure login
              uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            # Use kubelogin to configure your kubeconfig for Azure auth
            - name: Set up kubelogin for non-interactive login
              uses: azure/use-kubelogin@0ce7c36141aa27d4934872cf00b0120804c98a29 # v1.3
              with:
                  kubelogin-version: "{ { KUBELOGINVERSION } }"

            # Retrieves kubeconfig for managed namespace via Azure CLI
            # (aks-set-context does not support managed namespaces yet)
            - name: Get K8s context (managed namespace)
              run: |
                  az aks namespace get-credentials \
                    --name ${{ env.NAMESPACE }} \
                    --resource-group ${{ env.CLUSTER_RESOURCE_GROUP }} \
                    --cluster-name ${{ env.CLUSTER_NAME }} \
                    --file "${{ runner.temp }}/kubeconfig" \
                    --overwrite-existing

                  kubelogin convert-kubeconfig \
                    -l azurecli \
                    --kubeconfig "${{ runner.temp }}/kubeconfig"

                  echo "KUBECONFIG=${{ runner.temp }}/kubeconfig" >> $GITHUB_ENV

            # Deploys application based on given manifest file
            - name: Deploys application
              uses: Azure/k8s-deploy@c7ebd0d5f39477a23f1b5dea0f52e6db04adf28e # v6.0.0
              with:
                  action: deploy
                  manifests: ${{ env.DEPLOYMENT_MANIFEST_PATH }}
                  images: |
                      ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.CONTAINER_NAME }}:${{ github.sha }}
                  namespace: ${{ env.NAMESPACE }}

            # Annotates the deployed resources with metadata for traceability
            - name: Annotate deployment
              run: |
                  if kubectl get deployment -n ${{ env.NAMESPACE }} --no-headers 2>/dev/null | grep -q .; then
                    kubectl annotate deployment --all -n ${{ env.NAMESPACE }} \
                      aks-project/pipeline-repo="${{ github.repository }}" \
                      aks-project/pipeline-workflow="${{ github.workflow }}" \
                      aks-project/deployed-by="vscode" \
                      aks-project/pipeline-run-url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
                      --overwrite
                  fi
