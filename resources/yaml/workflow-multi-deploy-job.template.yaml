    { { DEPLOY_JOB_ID } }:
        permissions:
            actions: read
            contents: read
            id-token: write
        runs-on: ubuntu-latest
        needs: [build]
        env:
            DEPLOYMENT_MANIFEST_PATH: { { DEPLOYMENTMANIFESTPATH } }
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Azure login
              uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Set up kubelogin for non-interactive login
              uses: azure/use-kubelogin@0ce7c36141aa27d4934872cf00b0120804c98a29 # v1.3
              with:
                  kubelogin-version: "{ { KUBELOGINVERSION } }"

            - name: Get K8s context
              uses: azure/aks-set-context@60623acbdcbbdcf799ad50a1adf8703874339f8b # v5.0.0
              with:
                  resource-group: ${{ env.CLUSTER_RESOURCE_GROUP }}
                  cluster-name: ${{ env.CLUSTER_NAME }}
                  admin: "false"
                  use-kubelogin: "true"

            - name: Deploys application
              uses: Azure/k8s-deploy@c7ebd0d5f39477a23f1b5dea0f52e6db04adf28e # v6.0.0
              with:
                  action: deploy
                  manifests: ${{ env.DEPLOYMENT_MANIFEST_PATH }}
                  images: |
{ { IMAGES } }
                  namespace: ${{ env.NAMESPACE }}

            - name: Annotate deployment
              run: |
                  if kubectl get deployment -n ${{ env.NAMESPACE }} --no-headers 2>/dev/null | grep -q .; then
                    kubectl annotate deployment --all -n ${{ env.NAMESPACE }} \
                      aks-project/pipeline-repo="${{ github.repository }}" \
                      aks-project/pipeline-workflow="${{ github.workflow }}" \
                      aks-project/deployed-by="vscode" \
                      aks-project/pipeline-run-url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
                      --overwrite
                  fi
