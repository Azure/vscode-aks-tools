    build:
        permissions:
            contents: read
            id-token: write
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
{ { MATRIX_INCLUDE } }
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Azure login
              uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Log into ACR
              run: |
                  az acr login -n ${{ env.AZURE_CONTAINER_REGISTRY }}

            - name: Build and push image to ACR
              run: |
                  az acr build --image ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ matrix.image }}:${{ github.sha }} --registry ${{ env.AZURE_CONTAINER_REGISTRY }} -g ${{ env.ACR_RESOURCE_GROUP }} -f "${{ matrix.docker_file }}" "${{ matrix.build_context }}"
